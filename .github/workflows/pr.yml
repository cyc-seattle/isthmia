on:
  pull_request:
  push:
    branches:
      - main

jobs:
  build:
    name: pr-check
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
      - uses: cachix/install-nix-action@v31
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes
      - run: nix develop --command just ci
